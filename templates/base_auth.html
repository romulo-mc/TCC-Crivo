{% load static %}
<!DOCTYPE html>
<html lang="pt-br" {% if user_prefs.modo_escuro %}data-bs-theme="dark"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crivo - Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @font-face { font-family: 'OpenDyslexic'; src: url("{% static 'fonts/OpenDyslexic3-Regular.ttf' %}") format('truetype'); font-display: swap; }
        @font-face { font-family: 'FastFont'; src: url("{% static 'fonts/Fast_Sans.ttf' %}") format('truetype'); font-display: swap; }
        @font-face { font-family: 'FastOpenDyslexic'; src: url("{% static 'fonts/Fast_OpenDyslexic.ttf' %}") format('truetype'); font-display: swap; }

        :root {
            --bg-body: #FFF5EC; --text-color: #333;
            --font-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-size: 1rem; --transition-speed: 0.3s;
        }

        body {
            background-color: var(--bg-body); color: var(--text-color);
            font-family: var(--font-base); font-size: var(--font-size);
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        [data-bs-theme="dark"] { --bg-body: #121212; --text-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: var(--bg-body); color: var(--text-color); }
        [data-bs-theme="dark"] .bg-white, [data-bs-theme="dark"] .bg-light { background-color: #1e1e1e !important; color: #f8f9fa !important; border-color: #333 !important; }
        [data-bs-theme="dark"] .text-dark { color: #f8f9fa !important; }
        [data-bs-theme="dark"] .text-muted, [data-bs-theme="dark"] .text-secondary { color: #adb5bd !important; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border-color: #333 !important; }

        body.alto-contraste { --bg-body: #000000; --text-color: #FFFFFF; }
        body.alto-contraste * { background-color: #000 !important; color: #FFF !important; border-color: #FFF !important; }
        body.alto-contraste a, body.alto-contraste .btn { color: #FFFF00 !important; border-color: #FFFF00 !important; }

        body.fonte-dislexia, body.fonte-dislexia *:not([class*="bi-"]) { font-family: 'OpenDyslexic', sans-serif !important; letter-spacing: 0.5px !important; }
        body.fonte-tdah, body.fonte-tdah *:not([class*="bi-"]) { font-family: 'FastFont', sans-serif !important; letter-spacing: 0.3px !important; }
        body.fonte-tdah.fonte-dislexia, body.fonte-tdah.fonte-dislexia *:not([class*="bi-"]) { font-family: 'FastOpenDyslexic', sans-serif !important; letter-spacing: 0.5px !important; }
        body.fonte-tdah b.bionic-fix { font-weight: 900 !important; color: inherit; }

        body.fonte-XP { --font-size: 0.75rem; } body.fonte-P { --font-size: 0.85rem; }
        body.fonte-G { --font-size: 1.25rem; } body.fonte-XG { --font-size: 1.5rem; }
        
        body.reduzir-animacoes *:not([vw]):not([vw] *) { --transition-speed: 0s !important; transition: none !important; animation: none !important; }

        .skip-link {
            position: absolute; top: -40px; left: 0; background: #4A90E2; color: white; padding: 8px;
            z-index: 2000; transition: top 0.2s; text-decoration: none; border-bottom-right-radius: 8px;
        }
        .skip-link:focus { top: 0; }
        .auth-accessibility { position: absolute; top: 20px; right: 20px; z-index: 1050; }
        :focus-visible { outline: 3px solid #4A90E2 !important; outline-offset: 2px; }
    </style>
</head>
<body class="
    {% if user_prefs.alto_contraste %}alto-contraste{% endif %}
    {% if user_prefs.fonte_dislexia %}fonte-dislexia{% endif %}
    {% if user_prefs.fonte_tdah %}fonte-tdah{% endif %}
    {% if user_prefs.reduzir_animacoes %}reduzir-animacoes{% endif %}
    fonte-{{ user_prefs.tamanho_fonte|default:'M' }}
">

    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <header class="auth-accessibility" role="banner">
        <a href="{% url 'acessibilidade' %}" class="btn btn-link text-secondary p-0" title="Opções de Acessibilidade" aria-label="Abrir painel de acessibilidade">
            <i class="bi bi-universal-access-circle fs-3" aria-hidden="true"></i>
        </a>
    </header>

    <main class="container bionic-target" id="main-content" tabindex="-1">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        window.applyBionicReading = function() {
            const targetArea = document.querySelector('.bionic-target');
            if(!targetArea || targetArea.classList.contains('bionic-applied')) return;
            
            targetArea.classList.add('bionic-applied');
            const walker = document.createTreeWalker(targetArea, NodeFilter.SHOW_TEXT, null, false);
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);

            nodes.forEach(node => {
                const parent = node.parentElement;
                if (!parent || parent.tagName === 'SCRIPT' || parent.tagName === 'STYLE' || parent.tagName === 'I' || parent.classList.contains('bionic-fix')) return;
                const words = node.nodeValue.split(/(\s+)/);
                let changed = false;
                const bionicHTML = words.map(word => {
                    if (word.trim().length > 1) {
                        changed = true;
                        const boldLength = Math.ceil(word.length / 2);
                        return `<b class="bionic-fix">${word.slice(0, boldLength)}</b>${word.slice(boldLength)}`;
                    }
                    return word;
                }).join('');
                if(changed && bionicHTML !== node.nodeValue) {
                    const span = document.createElement('span');
                    span.innerHTML = bionicHTML;
                    node.parentNode.replaceChild(span, node);
                }
            });
        };

        window.removeBionicReading = function() {
            document.querySelectorAll('.bionic-fix').forEach(b => {
                const parent = b.parentNode;
                parent.replaceChild(document.createTextNode(b.textContent), b);
                parent.normalize();
            });
            document.querySelector('.bionic-target')?.classList.remove('bionic-applied');
        };

        document.addEventListener("DOMContentLoaded", function() {
            if (document.body.classList.contains('fonte-tdah')) applyBionicReading();
        });
    </script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
