<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crivo - Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #FFF5EC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #4A90E2;
            color: white;
            padding: 8px;
            z-index: 2000;
            transition: top 0.2s;
            text-decoration: none;
            border-bottom-right-radius: 8px;
        }

        .skip-link:focus {
            top: 0;
        }
        
        .auth-accessibility {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }

        :focus-visible {
            outline: 3px solid #4A90E2 !important;
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <header class="auth-accessibility" role="banner">
        <button class="btn btn-link text-secondary p-0" title="Opções de Acessibilidade" aria-label="Abrir painel de acessibilidade">
            <i class="bi bi-universal-access-circle fs-3" aria-hidden="true"></i>
        </button>
    </header>

    <main class="container" id="main-content" tabindex="-1">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
