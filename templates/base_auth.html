{% load static %}
<!DOCTYPE html>
<html lang="pt-br" 
      class="fonte-{{ user_prefs.tamanho_fonte|default:'M' }}" 
      {% if user_prefs.modo_escuro %}data-bs-theme="dark"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crivo - Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    
    <style>
        @font-face { font-family: 'OpenDyslexic'; src: url("{% static 'fonts/OpenDyslexic3-Regular.ttf' %}") format('truetype'); font-display: swap; }
        @font-face { font-family: 'FastFont'; src: url("{% static 'fonts/Fast_Sans.ttf' %}") format('truetype'); font-display: swap; }
        @font-face { font-family: 'FastOpenDyslexic'; src: url("{% static 'fonts/Fast_OpenDyslexic.ttf' %}") format('truetype'); font-display: swap; }

        :root {
            --bg-body: #FFF5EC; --text-color: #333;
            --font-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-speed: 0.3s;
        }

        html.fonte-XP { font-size: 12px !important; }
        html.fonte-P { font-size: 14px !important; }
        html.fonte-M { font-size: 16px !important; }
        html.fonte-G { font-size: 20px !important; }
        html.fonte-XG { font-size: 24px !important; }

        body {
            background-color: var(--bg-body); color: var(--text-color);
            font-family: var(--font-base); 
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        [data-bs-theme="dark"] { --bg-body: #121212; --text-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: var(--bg-body); color: var(--text-color); }
        [data-bs-theme="dark"] .bg-white, [data-bs-theme="dark"] .bg-light, [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; color: #f8f9fa !important; border-color: #333 !important; }
        [data-bs-theme="dark"] .text-dark { color: #f8f9fa !important; }
        [data-bs-theme="dark"] .text-muted, [data-bs-theme="dark"] .text-secondary { color: #adb5bd !important; }

        body.alto-contraste { background-color: #000000 !important; color: #FFFFFF !important; }
        body.alto-contraste * { background-color: transparent !important; color: #FFFFFF !important; border-color: #FFFF00 !important; }
        body.alto-contraste .card, body.alto-contraste .bg-white, body.alto-contraste .bg-light { background-color: #000000 !important; border: 2px solid #FFFFFF !important; }
        body.alto-contraste a, body.alto-contraste .btn { color: #FFFF00 !important; border-color: #FFFF00 !important; }
        body.alto-contraste .btn { background-color: #000000 !important; }

        body.fonte-dislexia, body.fonte-dislexia *:not([class*="bi-"]) { font-family: 'OpenDyslexic', sans-serif !important; letter-spacing: 0.5px !important; }
        body.fonte-tdah, body.fonte-tdah *:not([class*="bi-"]) { font-family: 'FastFont', sans-serif !important; letter-spacing: 0.3px !important; }
        body.fonte-tdah.fonte-dislexia, body.fonte-tdah.fonte-dislexia *:not([class*="bi-"]) { font-family: 'FastOpenDyslexic', sans-serif !important; letter-spacing: 0.5px !important; }
        
        body.fonte-tdah [class^="bi-"], body.fonte-tdah [class*=" bi-"], 
        body.fonte-dislexia [class^="bi-"], body.fonte-dislexia [class*=" bi-"] {
            font-family: bootstrap-icons !important; letter-spacing: normal !important;
        }

        body.reduzir-animacoes *, body.reduzir-animacoes *:not([vw]):not([vw] *) { --transition-speed: 0s !important; transition: none !important; animation: none !important; }

        .skip-link { position: absolute; top: -40px; left: 0; background: #4A90E2; color: white; padding: 8px; z-index: 2000; transition: top 0.2s; text-decoration: none; border-bottom-right-radius: 8px; }
        .skip-link:focus { top: 0; outline: 3px solid #FFF; }
        
        .auth-accessibility { position: absolute; top: 20px; right: 20px; z-index: 1050; }
        :focus-visible { outline: 3px solid #4A90E2 !important; outline-offset: 2px; }

        @keyframes toastProgressAnimAuth { from { width: 100%; } to { width: 0%; } }
        .toast-progress-bar { height: 4px; background-color: rgba(255, 255, 255, 0.7); animation: toastProgressAnimAuth 7s linear forwards; }
    </style>
</head>
<body class="
    {% if user_prefs.alto_contraste %}alto-contraste{% endif %}
    {% if user_prefs.fonte_dislexia %}fonte-dislexia{% endif %}
    {% if user_prefs.fonte_tdah %}fonte-tdah{% endif %}
    {% if user_prefs.reduzir_animacoes %}reduzir-animacoes{% endif %}
">

    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <header class="auth-accessibility" role="banner">
        <a href="{% url 'acessibilidade' %}" class="btn btn-link text-secondary p-0" title="Opções de Acessibilidade" aria-label="Abrir painel de acessibilidade">
            <i class="bi bi-universal-access-circle fs-2" aria-hidden="true"></i>
        </a>
    </header>

    <main class="container bionic-target d-flex align-items-center min-vh-100" id="main-content" tabindex="-1">
        {% block content %}
        {% endblock %}
    </main>

    {% if messages %}
    <div class="toast-container position-fixed bottom-0 end-0 p-4" style="z-index: 1055;">
        {% for message in messages %}
            <div class="toast d-flex flex-column text-white bg-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}primary{% endif %} border-0 shadow-lg overflow-hidden" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="7000">
                <div class="d-flex align-items-center p-2">
                    <div class="toast-body fw-bold fs-6 d-flex align-items-center gap-2 flex-grow-1 mb-0 pb-0 pt-1">
                        {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill fs-5"></i>
                        {% elif message.tags == 'error' %}<i class="bi bi-exclamation-triangle-fill fs-5"></i>
                        {% else %}<i class="bi bi-info-circle-fill fs-5"></i>{% endif %}
                        {{ message }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar notificação"></button>
                </div>
                <div class="toast-progress-bar"></div>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var toastElList = [].slice.call(document.querySelectorAll('.toast-container .toast'));
            var toastList = toastElList.map(function(toastEl) { return new bootstrap.Toast(toastEl).show(); });
        });

        window.applyBionicReading = function() {
            const targetArea = document.querySelector('.bionic-target');
            if(!targetArea || targetArea.classList.contains('bionic-applied')) return;
            
            targetArea.classList.add('bionic-applied');
            const walker = document.createTreeWalker(targetArea, NodeFilter.SHOW_TEXT, null, false);
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);

            nodes.forEach(node => {
                const parent = node.parentElement;
                if (!parent || ['SCRIPT', 'STYLE', 'I', 'BUTTON'].includes(parent.tagName) || parent.classList.contains('bionic-fix')) return;
                
                const words = node.nodeValue.split(/(\s+)/);
                let changed = false;
                const bionicHTML = words.map(word => {
                    if (word.trim().length > 2) {
                        changed = true;
                        const boldLength = Math.ceil(word.length / 2);
                        return `<b class="bionic-fix" style="font-weight: 900 !important; color: inherit;">${word.slice(0, boldLength)}</b>${word.slice(boldLength)}`;
                    }
                    return word;
                }).join('');
                
                if(changed && bionicHTML !== node.nodeValue) {
                    const span = document.createElement('span');
                    span.innerHTML = bionicHTML;
                    node.parentNode.replaceChild(span, node);
                }
            });
        };

        document.addEventListener("DOMContentLoaded", function() {
            if (document.body.classList.contains('fonte-tdah')) {
                setTimeout(applyBionicReading, 100);
            }
        });
    </script>

    <div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
