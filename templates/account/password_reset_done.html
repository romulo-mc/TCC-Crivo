{% extends base_template|default:"base_auth.html" %}
{% block content %}
<div class="row justify-content-center align-items-center w-100 mx-auto py-5">
    <div class="col-md-8 col-lg-5 col-xl-4">
        <div class="card shadow-lg border-0 text-center" style="border-radius: 30px;">
            <div class="card-body p-4 p-md-5">
                <i class="bi bi-envelope-paper-heart-fill" style="font-size: 5rem; color: #90E0AA;"></i>
                <h2 class="fw-bold text-dark mt-3 mb-3">E-mail Enviado!</h2>
                <p class="text-muted mb-4">Se o e-mail estiver cadastrado no Crivo, você receberá um link para criar uma nova senha em instantes.</p>
                <div class="p-3 mb-4 rounded-4 text-start" style="background-color: #fff3cd; color: #856404; font-size: 0.9rem;">
                    <i class="bi bi-info-circle-fill me-1"></i> Não esqueça de checar a sua caixa de <strong>Spam</strong> ou Lixo Eletrônico!
                </div>
                <a href="{% url 'login' %}" class="btn btn-lg w-100 fw-bold shadow-sm" style="background-color: #E0F0F5; border-radius: 20px; color: #333;">
                    Voltar para o Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
