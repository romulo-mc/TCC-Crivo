{% extends base_template|default:"base_auth.html" %}
{% block content %}
<div class="row justify-content-center align-items-center w-100 mx-auto py-5">
    <div class="col-md-8 col-lg-5 col-xl-4">
        <div class="card shadow-lg border-0" style="border-radius: 30px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-key-fill" style="font-size: 4rem; color: #9b59b6;"></i>
                </div>
                <h2 class="fw-bold text-dark text-center mb-4">Recuperar Senha</h2>
                <p class="text-muted text-center mb-4">Esqueceu sua senha? Digite seu e-mail abaixo e enviaremos um link para você redefini-la.</p>
                
                <form method="POST" action="{% url 'account_reset_password' %}">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">E-mail cadastrado</label>
                        <input type="email" name="email" class="form-control form-control-lg" style="border-radius: 15px; background-color: #E0F0F5; border: none;" required placeholder="exemplo@email.com">
                    </div>
                    <button type="submit" class="btn btn-lg w-100 fw-bold shadow-sm" style="background-color: #90e0aa; border-radius: 20px; color: #333;">
                        Enviar link de recuperação
                    </button>
                </form>
                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-muted"><i class="bi bi-arrow-left me-1"></i> Voltar para o Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
