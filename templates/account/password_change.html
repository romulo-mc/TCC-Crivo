{% extends "base.html" %}
{% block content %}
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="{% url 'configuracoes' %}" class="btn btn-outline-secondary rounded-circle" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-arrow-left fs-5"></i>
                </a>
                <h1 class="fw-bold mb-0 text-dark">Alterar Senha</h1>
            </div>

            <div class="card border-0 shadow-sm rounded-4 bg-white p-4 p-md-5">
                <form method="POST" action="{% url 'account_change_password' %}">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="alert alert-danger rounded-4 shadow-sm mb-4">
                        <ul class="mb-0 small">
                        {% for field in form %}{% if field.errors %}<li>{{ field.errors.0 }}</li>{% endif %}{% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Senha Atual</label>
                        <input type="password" name="old_password" class="form-control form-control-lg" style="border-radius: 15px; background-color: #E0F0F5; border: none;" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nova Senha</label>
                        <input type="password" name="new_password1" class="form-control form-control-lg" style="border-radius: 15px; background-color: #E0F0F5; border: none;" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Confirme a Nova Senha</label>
                        <input type="password" name="new_password2" class="form-control form-control-lg" style="border-radius: 15px; background-color: #E0F0F5; border: none;" required>
                    </div>
                    
                    <button type="submit" class="btn btn-lg w-100 fw-bold shadow-sm" style="background-color: #90e0aa; border-radius: 20px; color: #333;">
                        Salvar Nova Senha
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock %}
