{% extends base_template|default:"base_auth.html" %}
{% block content %}
<div class="row justify-content-center align-items-center w-100 mx-auto py-5">
    <div class="col-md-8 col-lg-5 col-xl-4">
        <div class="card shadow-lg border-0 text-center" style="border-radius: 30px;">
            <div class="card-body p-4 p-md-5">
                <i class="bi bi-check-circle-fill" style="font-size: 5rem; color: #90E0AA;"></i>
                <h2 class="fw-bold text-dark mt-3 mb-3">Senha Alterada!</h2>
                <p class="text-muted mb-4">Sua nova senha foi salva com sucesso. Você já pode acessar a comunidade Crivo com ela.</p>
                <a href="{% url 'login' %}" class="btn btn-lg w-100 fw-bold shadow-sm hover-lift" style="background-color: #90e0aa; border-radius: 20px; color: #333;">
                    Ir para o Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
