{% extends 'base.html' %}

{% block content %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<main class="container py-4" id="main-content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <h1 class="fw-bold mb-4 text-primary">
                {% if editando %}Editar Discussão{% else %}Iniciar Discussão{% endif %}
            </h1>
            
            <form method="post" class="card shadow-sm p-4 border-0 rounded-4" id="formTopico">
                {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="fw-bold mb-2 text-dark">{{ form.titulo.label }}</label>
                        {{ form.titulo }}
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold mb-2 text-dark">{{ form.categoria.label }}</label>
                        {{ form.categoria }}
                    </div>

                    <div class="mb-4 d-none" id="div_id_outra_categoria">
                        <label class="fw-bold mb-2 text-dark">{{ form.outra_categoria.label }}</label>
                        {{ form.outra_categoria }}
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold mb-2 text-dark">{{ form.conteudo.label }}</label>
                        <div id="editor-container" style="height: 250px; border-radius: 0 0 12px 12px; font-size: 1.1rem; background-color: #fff;"></div>
                        <textarea name="conteudo" id="id_conteudo" class="d-none">{{ form.conteudo.value|default_if_none:'' }}</textarea>
                    </div>

                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                        {% if editando %}Salvar Alterações{% else %}Publicar Discussão{% endif %}
                    </button>
                    <a href="{% if editando %}{% url 'detalhe_topico' topico.slug %}{% else %}{% url 'lista_forum' %}{% endif %}" class="btn btn-light rounded-pill px-4 fw-bold">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Relate sua experiência ou dúvida de forma detalhada...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'strike'],
                    [{ 'header': 1 }, { 'header': 2 }],
                    ['blockquote'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        var textareaConteudo = document.querySelector('#id_conteudo');
        if (textareaConteudo.value) {
            quill.root.innerHTML = textareaConteudo.value;
        }

        var form = document.querySelector('#formTopico');
        form.onsubmit = function() {
            textareaConteudo.value = quill.root.innerHTML;
        };

        const selectCategoria = document.getElementById('id_categoria');
        const inputOutra = document.getElementById('id_outra_categoria');
        const divOutra = document.getElementById('div_id_outra_categoria');

        if (!divOutra || !inputOutra) return;

        function verificarCategoria() {
            const textoSelecionado = selectCategoria.options[selectCategoria.selectedIndex].text;
            if (textoSelecionado.includes('Outro')) {
                divOutra.classList.remove('d-none');
                inputOutra.classList.remove('d-none');
                inputOutra.required = true;
            } else {
                divOutra.classList.add('d-none');
                inputOutra.classList.add('d-none');
                inputOutra.required = false;
                inputOutra.value = '';
            }
        }
        selectCategoria.addEventListener('change', verificarCategoria);
        verificarCategoria();
    });
</script>

<style>
    .ql-toolbar.ql-snow { border-radius: 12px 12px 0 0; background-color: #f8f9fa; border-color: #dee2e6; }
    .ql-container.ql-snow { border-color: #dee2e6; border-radius: 0 0 12px 12px; }
</style>
{% endblock %}
