{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

<main class="container py-4" id="main-content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <h1 class="fw-bold mb-4 text-primary">
                {% if editando %}Editar Discussão{% else %}Iniciar Discussão{% endif %}
            </h1>
            
            <form method="post" class="card shadow-sm p-4 border-0 rounded-4">
                {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-4 {% if field.name == 'outra_categoria' %}d-none{% endif %}" id="div_{{ field.id_for_label }}">
                            <label class="fw-bold mb-2 text-dark">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text small text-muted mt-1">{{ field.help_text }}</div>
                            {% endif %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        </div>
                    {% endfor %}
                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                        {% if editando %}Salvar Alterações{% else %}Publicar Discussão{% endif %}
                    </button>
                    <a href="{% if editando %}{% url 'detalhe_topico' topico.slug %}{% else %}{% url 'lista_forum' %}{% endif %}" class="btn btn-light rounded-pill px-4 fw-bold">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const textareaConteudo = document.getElementById('id_conteudo');
        if (textareaConteudo) {
            new EasyMDE({
                element: textareaConteudo,
                spellChecker: false,
                status: false,
                placeholder: "Descreva sua vivência detalhadamente aqui...",
                toolbar: ["bold", "italic", "strikethrough", "|", "heading", "quote", "|", "unordered-list", "ordered-list"]
            });
        }

        const selectCategoria = document.getElementById('id_categoria');
        const inputOutra = document.getElementById('id_outra_categoria');
        const divOutra = document.getElementById('div_id_outra_categoria');

        if (!divOutra || !inputOutra) return;

        function verificarCategoria() {
            const textoSelecionado = selectCategoria.options[selectCategoria.selectedIndex].text;
            
            if (textoSelecionado.includes('Outro')) {
                divOutra.classList.remove('d-none');
                inputOutra.classList.remove('d-none');
                
                inputOutra.required = true;
                inputOutra.focus();
            } else {
                divOutra.classList.add('d-none');
                inputOutra.classList.add('d-none');
                inputOutra.required = false;
                inputOutra.value = '';
            }
        }

        selectCategoria.addEventListener('change', verificarCategoria);
        verificarCategoria();
    });
</script>

<style>
    .editor-toolbar { border-radius: 12px 12px 0 0; border-color: #dee2e6; opacity: 0.9; }
    .CodeMirror { border-radius: 0 0 12px 12px; border-color: #dee2e6; min-height: 250px; font-size: 1.1rem;}
</style>
{% endblock %}
