{% extends 'base.html' %}

{% block content %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<main class="container py-5" id="main-content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <h1 class="fw-bold mb-4 text-primary">Editar Resposta</h1>
            
            <form method="post" class="card shadow-sm p-4 border-0 rounded-4" id="formEditarResposta">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="conteudo" class="fw-bold mb-2 text-dark">Sua Resposta</label>
                    <div id="editor-container" style="height: 150px; border-radius: 0 0 12px 12px; font-size: 1.1rem; background-color: #fff;"></div>
                    <textarea name="conteudo" id="id_conteudo_editar" class="d-none" required>{{ resposta.conteudo }}</textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Salvar Alterações</button>
                    <a href="{% url 'detalhe_topico' resposta.topico.slug %}" class="btn btn-light rounded-pill px-4 fw-bold">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: { toolbar: [ ['bold', 'italic', 'strike'], ['blockquote'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean'] ] }
        });

        var textareaConteudo = document.querySelector('#id_conteudo_editar');
        if (textareaConteudo.value) { quill.root.innerHTML = textareaConteudo.value; }

        var form = document.querySelector('#formEditarResposta');
        form.onsubmit = function() { textareaConteudo.value = quill.root.innerHTML; };
    });
</script>

<style>
    .ql-toolbar.ql-snow { border-radius: 12px 12px 0 0; background-color: #f8f9fa; border-color: #dee2e6; }
    .ql-container.ql-snow { border-color: #dee2e6; border-radius: 0 0 12px 12px; }
</style>
{% endblock %}
