{% extends 'base.html' %}

{% block content %}
<main class="container py-5" id="main-content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <h1 class="fw-bold mb-4 text-primary">Editar Resposta</h1>
            
            <form method="post" class="card shadow-sm p-4 border-0 rounded-4">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="conteudo" class="fw-bold mb-2 text-dark">Sua Resposta</label>
                    <textarea name="conteudo" id="conteudo" class="form-control" rows="5" required>{{ resposta.conteudo }}</textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Salvar Alterações</button>
                    <a href="{% url 'detalhe_topico' resposta.topico.slug %}" class="btn btn-light rounded-pill px-4 fw-bold">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
