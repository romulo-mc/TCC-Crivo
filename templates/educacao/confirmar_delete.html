{% extends 'base.html' %}

{% block content %}
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow-sm rounded-4 text-center p-5">
                <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-3"></i>
                <h1 class="fw-bold h3 text-dark mb-3">Excluir Recurso?</h1>
                <p class="text-muted fs-5 mb-4">Tem certeza que deseja apagar permanentemente o recurso <strong>"{{ recurso.titulo }}"</strong>? Esta ação não pode ser desfeita.</p>
                
                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <a href="{% url 'lista_recursos' %}" class="btn btn-light rounded-pill px-4 fw-bold">Cancelar</a>
                    <button type="submit" class="btn btn-danger rounded-pill px-5 fw-bold shadow-sm">Sim, Excluir</button>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock %}
