{% extends 'base.html' %}

{% block content %}
<main class="container py-5" id="main-content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="fw-bold mb-4 text-primary">Editar Avaliação</h1>
            
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-light border-bottom-0 pt-4 px-4 rounded-top-4">
                    <h2 class="h5 fw-bold text-dark mb-0">{{ review.item.titulo }}</h2>
                    <p class="text-muted small">Atualize suas notas e justificativa.</p>
                </div>
                <div class="card-body px-4 pb-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label for="id_nota_geral" class="fw-bold mb-1">Nota Geral</label>
                                {{ form.nota_geral }}
                            </div>
                            <div class="col-md-4">
                                <label for="id_nota_representatividade" class="fw-bold mb-1 text-primary">Representatividade</label>
                                {{ form.nota_representatividade }}
                            </div>
                            <div class="col-md-4">
                                <label for="id_nota_critica" class="fw-bold mb-1 text-warning-emphasis">Qualidade Crítica</label>
                                {{ form.nota_critica }}
                            </div>
                            <div class="col-12 mt-3">
                                <label for="id_comentario_justificativa" class="fw-bold mb-1">Sua Justificativa</label>
                                {{ form.comentario_justificativa }}
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 rounded-pill fw-bold w-100 shadow-sm">Salvar Alterações</button>
                            <a href="{% url 'detalhe_item' review.item.id %}" class="btn btn-light px-4 rounded-pill fw-bold">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
