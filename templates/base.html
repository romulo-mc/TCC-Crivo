{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crivo - Acervo Anticapacitista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #FFF5EC;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            padding-top: 60px;
        }

        #sidebar-wrapper {
            position: fixed;
            top: 60px;
            left: 0;
            bottom: 0;
            width: 220px;
            height: calc(100vh - 60px);
            background-color: #90E0AA;
            transition: width 0.3s ease;
            overflow-y: auto;
            z-index: 1000;
        }

        #sidebar-wrapper.toggled {
            width: 80px;
        }
        
        #sidebar-wrapper.toggled .link-text, 
        #sidebar-wrapper.toggled .sidebar-header,
        #sidebar-wrapper.toggled small {
            display: none !important;
        }
        
        #sidebar-wrapper.toggled .nav-link {
            justify-content: center !important;
            gap: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        #page-content-wrapper {
            width: 100%;
            margin-left: 220px; 
            transition: margin-left 0.3s ease;
        }

        #sidebar-wrapper.toggled ~ #page-content-wrapper {
            margin-left: 80px;
        }

        @media (max-width: 768px) {
            #sidebar-wrapper { margin-left: -220px; }
            #sidebar-wrapper.toggled { margin-left: 0; width: 220px; }
            #page-content-wrapper { margin-left: 0 !important; }
            #sidebar-wrapper.toggled .link-text { display: inline !important; }
            #sidebar-wrapper.toggled .nav-link { justify-content: flex-start !important; }
            #sidebar-wrapper.toggled .nav-link { gap: 1rem !important; padding-left: 1rem !important; }
        }
    </style>
</head>
<body>

    {% include 'includes/navbar.html' %}

    <div class="d-flex" id="wrapper">
        
        {% if user.is_authenticated %}
            {% include 'includes/sidebar.html' %}
        {% endif %}

        <div id="page-content-wrapper" style="{% if not user.is_authenticated %} margin-left: 0 !important; {% endif %}">
            <main class="container-fluid p-4">
                {% block content %}
                {% endblock %}
            </main>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggleButton = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar-wrapper");
        
        if (toggleButton && sidebar) {
            toggleButton.addEventListener("click", function(e) {
                e.preventDefault();
                sidebar.classList.toggle("toggled");
            });
        }
    </script>
</body>
</html>
