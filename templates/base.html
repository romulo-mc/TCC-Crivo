{% load static %}
<!DOCTYPE html>
<html lang="pt-br" {% if user_prefs.modo_escuro %}data-bs-theme="dark"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crivo: Vivência e Diálogo Anticapacitista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @font-face { font-family: 'OpenDyslexic'; src: url("{% static 'fonts/OpenDyslexic3-Regular.ttf' %}") format('truetype'); font-display: swap; }
        @font-face { font-family: 'FastFont'; src: url("{% static 'fonts/Fast_Sans.ttf' %}") format('truetype'); font-display: swap; }
        @font-face { font-family: 'FastOpenDyslexic'; src: url("{% static 'fonts/Fast_OpenDyslexic.ttf' %}") format('truetype'); font-display: swap; }

        :root {
            --bg-body: #FFF5EC; --text-color: #212529; --bg-sidebar: #90E0AA;
            --navbar-bg: #4A90E2; --navbar-text: #ffffff;
            --form-input-bg: #f8f9fa; --form-input-text: #6c757d;
            --card-bg: #ffffff; --border-color: #dee2e6;
            --font-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-size: 1rem; --transition-speed: 0.3s;
        }

        body {
            background-color: var(--bg-body); color: var(--text-color);
            font-family: var(--font-base); font-size: var(--font-size);
            overflow-x: hidden; padding-top: 60px;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        [data-bs-theme="dark"] {
            --bg-body: #121212; --text-color: #f8f9fa; --bg-sidebar: #1a2c22;
            --navbar-bg: #1e3a5f; --form-input-bg: #2a2a2a; --form-input-text: #f8f9fa;
            --card-bg: #1e1e1e; --border-color: #333;
        }
        [data-bs-theme="dark"] body { background-color: var(--bg-body); color: var(--text-color); }
        [data-bs-theme="dark"] .bg-white, [data-bs-theme="dark"] .bg-light { background-color: #1e1e1e !important; color: #f8f9fa !important; border-color: #333 !important; }
        [data-bs-theme="dark"] .text-dark { color: #f8f9fa !important; }
        [data-bs-theme="dark"] .text-muted, [data-bs-theme="dark"] .text-secondary { color: #adb5bd !important; }
        [data-bs-theme="dark"] .border, [data-bs-theme="dark"] .border-bottom, [data-bs-theme="dark"] .border-top, [data-bs-theme="dark"] hr { border-color: #333 !important; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border-color: #333 !important; }

        body.fonte-dislexia, body.fonte-dislexia *:not([class*="bi-"]) { font-family: 'OpenDyslexic', sans-serif !important; letter-spacing: 0.5px !important; }
        body.fonte-tdah, body.fonte-tdah *:not([class*="bi-"]) { font-family: 'FastFont', sans-serif !important; letter-spacing: 0.3px !important; }
        body.fonte-tdah.fonte-dislexia, body.fonte-tdah.fonte-dislexia *:not([class*="bi-"]) { font-family: 'FastOpenDyslexic', sans-serif !important; letter-spacing: 0.5px !important; }
        
        body.fonte-tdah b.bionic-fix { font-weight: 900 !important; color: inherit; }

        body.fonte-XP { --font-size: 0.75rem; } body.fonte-P { --font-size: 0.85rem; }
        body.fonte-G { --font-size: 1.25rem; } body.fonte-XG { --font-size: 1.5rem; }
        
        body.reduzir-animacoes *:not([vw]):not([vw] *) { 
            --transition-speed: 0s !important; transition: none !important; animation: none !important; 
        }

        .skip-link {
            position: absolute; top: -40px; left: 0; background: #4A90E2; color: white; padding: 8px;
            z-index: 2000; transition: top 0.2s; text-decoration: none; border-bottom-right-radius: 8px;
        }
        .skip-link:focus { top: 0; outline: 3px solid #FFF; }

        #sidebar-wrapper {
            position: fixed; top: 60px; left: 0; bottom: 0; width: 220px;
            height: calc(100vh - 60px); background-color: var(--bg-sidebar);
            transition: width var(--transition-speed) ease; overflow-y: auto; z-index: 1000; border-right: 1px solid rgba(0,0,0,0.1);
        }
        #sidebar-wrapper.toggled { width: 80px; }
        #sidebar-wrapper.toggled .link-text, #sidebar-wrapper.toggled .sidebar-header, #sidebar-wrapper.toggled small { display: none !important; }
        #sidebar-wrapper.toggled .nav-link { justify-content: center !important; gap: 0 !important; padding: 0 !important; }
        #page-content-wrapper { width: 100%; margin-left: 220px; transition: margin-left var(--transition-speed) ease; }
        #sidebar-wrapper.toggled ~ #page-content-wrapper { margin-left: 80px; }
        :focus-visible { outline: 3px solid #4A90E2 !important; outline-offset: 2px; }

        @media (max-width: 768px) {
            #sidebar-wrapper { margin-left: -220px; }
            #sidebar-wrapper.toggled { margin-left: 0; width: 220px; }
            #page-content-wrapper { margin-left: 0 !important; }
            #sidebar-wrapper.toggled .link-text { display: inline !important; }
            #sidebar-wrapper.toggled .nav-link { justify-content: flex-start !important; gap: 1rem !important; padding-left: 1rem !important; }
        }
        
        .hover-dropzone:focus, .hover-dropzone:hover { background-color: #f8f9fa !important; transform: scale(1.02); }

        .btn-outline-custom-warning {
            border: 2px solid #ffc107;
            color: var(--text-color);
            background-color: transparent;
            transition: all 0.3s ease;
        }
        .btn-outline-custom-warning i { color: #ffc107; transition: color 0.3s ease; }
        .btn-outline-custom-warning:hover {
            background-color: #ffc107;
            color: #000;
        }
        .btn-outline-custom-warning:hover i { color: #000; }

        .btn-outline-custom-danger {
            border: 2px solid #dc3545;
            color: var(--text-color);
            background-color: transparent;
            transition: all 0.3s ease;
        }
        .btn-outline-custom-danger i { color: #dc3545; transition: color 0.3s ease; }
        .btn-outline-custom-danger:hover {
            background-color: #dc3545;
            color: #fff;
        }
        .btn-outline-custom-danger:hover i { color: #fff; }
    </style>
</head>

<body class="
    {% if user_prefs.alto_contraste %}alto-contraste{% endif %}
    {% if user_prefs.fonte_dislexia %}fonte-dislexia{% endif %}
    {% if user_prefs.fonte_tdah %}fonte-tdah{% endif %}
    {% if user_prefs.reduzir_animacoes %}reduzir-animacoes{% endif %}
    fonte-{{ user_prefs.tamanho_fonte|default:'M' }}
">

    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    {% include 'includes/navbar.html' %}

    <div class="d-flex" id="wrapper">
        {% if user.is_authenticated %}
            {% include 'includes/sidebar.html' %}
        {% endif %}

        <div id="page-content-wrapper" style="{% if not user.is_authenticated %} margin-left: 0 !important; {% endif %}">
            <main class="container-fluid p-4 bionic-target" id="main-content" tabindex="-1">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
function votar(identificador, tipo, isResposta = false) {
    let url = isResposta 
        ? `/forum/resposta/${identificador}/votar/${tipo}/` 
        : `/forum/topico/${identificador}/votar/${tipo}/`;

    fetch(url, {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => {
        if (!response.ok) throw new Error('Erro na rede');
        return response.json();
    })
    .then(data => {
        const spanId = isResposta ? `votos-resp-${identificador}` : `votos-${identificador}`;
        const spanVotos = document.getElementById(spanId);
        if (spanVotos) spanVotos.innerText = data.total;

        let btnLike, btnDeslike;

        if (!isResposta) {
            btnLike = document.getElementById(`btn-like-topico-${identificador}`);
            btnDeslike = document.getElementById(`btn-deslike-topico-${identificador}`);
        } else {
            const container = document.getElementById(`votos-resp-${identificador}`).parentElement;
            btnLike = container.querySelector('button[onclick*="like"]');
            btnDeslike = container.querySelector('button[onclick*="deslike"]');
        }

        if (btnLike && btnDeslike) {
            btnLike.classList.remove('text-primary');
            btnDeslike.classList.remove('text-danger');
            btnLike.classList.add('text-muted');
            btnDeslike.classList.add('text-muted');
            
            const iconLike = btnLike.querySelector('i');
            const iconDeslike = btnDeslike.querySelector('i');

            if(iconLike.classList.contains('bi-hand-thumbs-up')) {
                iconLike.className = 'bi bi-hand-thumbs-up';
                iconDeslike.className = 'bi bi-hand-thumbs-down';
            } else {
                iconLike.className = 'bi bi-caret-up-fill';
                iconDeslike.className = 'bi bi-caret-down-fill';
            }

            if (data.user_voto === 'like') {
                btnLike.classList.replace('text-muted', 'text-primary');
                if(iconLike.classList.contains('bi-hand-thumbs-up')) iconLike.className = 'bi bi-hand-thumbs-up-fill';
            } else if (data.user_voto === 'deslike') {
                btnDeslike.classList.replace('text-muted', 'text-danger');
                if(iconDeslike.classList.contains('bi-hand-thumbs-down')) iconDeslike.className = 'bi bi-hand-thumbs-down-fill';
            }
        }
    })
    .catch(error => {
        console.error('Erro:', error);
        alert('Você precisa estar logado para votar!');
    });
}
</script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
